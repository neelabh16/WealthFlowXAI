version: "3.9"

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: wealthflow
      MYSQL_USER: wealthflow
      MYSQL_PASSWORD: wealthflow
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    command: sh -c "python manage.py migrate && python manage.py seed_demo && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis

  celery:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    command: celery -A config worker -l info
    volumes:
      - ../backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ../frontend
    env_file:
      - ../frontend/.env.example
    volumes:
      - ../frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
